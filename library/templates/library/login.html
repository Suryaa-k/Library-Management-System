{% extends 'library/base.html' %}

{% block auth_content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-icon">📚</div>
      <div class="login-title">SVG Book World</div>
      <div class="login-subtitle">Library Management System</div>
    </div>

    <form method="post" class="login-form">
      {% csrf_token %}
      {% if form.errors %}
      <div class="alert alert-error">Invalid username or password.</div>
      {% endif %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="Enter username" autofocus />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Enter password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Login to Library</button>
    </form>
    <p class="login-hint">🔒 Authorized library staff only</p>
  </div>
</div>
{% endblock %}
